name: CD

on:
  # فقط از طریق workflow_run trigger می‌شه — double deploy نداریم
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master, main]

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    # فقط وقتی CI موفق بود deploy بشه
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service web --detach

      - name: Wait for deployment to be ready
        run: sleep 30   # ← صبر می‌کنیم service بالا بیاد قبل از migrate

      - name: Run migrations
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway run --service web python manage.py migrate --no-input

      - name: Health check
        run: |
          sleep 10
          curl --fail ${{ secrets.RAILWAY_APP_URL }}/api/health/ || exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy failed! Check Railway dashboard."
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by CI run: ${{ github.event.workflow_run.html_url }}"