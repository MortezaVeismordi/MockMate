name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  DJANGO_SETTINGS_MODULE: config.settings.testing
  SECRET_KEY: "ci-secret-key-not-for-production"
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
  # Satisfy base.py's hard os.environ["DB_*"] reads at import time.
  # testing.py's dj_database_url.parse() block still wins at runtime.
  DB_NAME: test_db
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_HOST: localhost
  DB_PORT: "5432"
  REDIS_URL: redis://localhost:6379/0
  LLM_PROVIDER: ollama
  LLM_MODEL: llama3.2:3b

jobs:
  # ─── Lint & Format ──────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # ← match با Python version پروژه
          cache: pip
          cache-dependency-path: |
            requirements/base.txt
            requirements/development.txt

      - name: Install lint tools
        run: pip install black==24.4.2 isort==5.13.2 bandit

      - name: Black format check
        run: black --check .

      - name: isort check
        run: isort --check-only .



      - name: Bandit security scan
        run: bandit -r apps/ -ll --exit-zero

  # ─── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # ← match با Python version پروژه
          cache: pip
          cache-dependency-path: |
            requirements/base.txt
            requirements/development.txt

      - name: Install system dependencies
        run: sudo apt-get install -y graphviz graphviz-dev

      - name: Install dependencies
        run: |
          pip install -r requirements/base.txt
          pip install -r requirements/development.txt

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Check for tests
        id: check_tests
        run: |
          # اگه تست‌ها هنوز push نشدن، CI رو skip می‌کنیم به‌جای fail
          TEST_COUNT=$(find apps/ -name "test_*.py" -o -name "*_test.py" | wc -l)
          echo "test_count=$TEST_COUNT" >> $GITHUB_OUTPUT
          echo "Found $TEST_COUNT test files"

      - name: Run tests
        if: steps.check_tests.outputs.test_count != '0'
        run: |
          pytest apps/ \
            --cov=apps \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60 \
            -v

      - name: Skip notice (no tests yet)
        if: steps.check_tests.outputs.test_count == '0'
        run: echo "⚠️ No test files found. Skipping coverage check until tests are added."

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always() && steps.check_tests.outputs.test_count != '0'
        with:
          fail_ci_if_error: false

  # ─── Docker Build ───────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose -f docker-compose.yml build web