# =============================================================================
# nginx.conf — AI Interviewer
# این فایل باید روی /etc/nginx/nginx.conf مونت شود (نه conf.d/default.conf)
# =============================================================================

# ─── تعداد worker بر اساس CPU core ──────────────────────────────────────────
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

# ─── Events ──────────────────────────────────────────────────────────────────
events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;        # بهترین I/O model برای Linux
}

# =============================================================================
http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging Format ──────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    log_format json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json;

    # ─── Performance ─────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens      off;    # نسخه nginx رو مخفی میکنه

    # ─── Buffer Tuning ───────────────────────────────────────────────────────
    client_body_buffer_size    128k;
    client_max_body_size       10m;    # حداکثر سایز upload
    client_header_buffer_size  1k;
    large_client_header_buffers 4 8k;

    # ─── Timeouts ────────────────────────────────────────────────────────────
    client_body_timeout    12s;
    client_header_timeout  12s;
    send_timeout           10s;

    # ─── Gzip ────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        image/svg+xml;

    # ─── Rate Limiting ────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/m;
    limit_req_zone $binary_remote_addr zone=otp:10m     rate=3r/m;
    limit_req_status 429;

    # ✅ اصلاح شد: map برای مدیریت صحیح WebSocket و HTTP keepalive
    # وقتی Upgrade header وجود داشته باشه → "upgrade" (WebSocket)
    # وقتی نداشته باشه → "close" (HTTP معمولی)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─── Upstream — Django + Daphne ───────────────────────────────────────────
    upstream django {
        server web:8000;
        keepalive 32;
    }

    # ─── Server ───────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ─── Security Headers ─────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"       always;
        add_header X-Content-Type-Options    "nosniff"          always;
        add_header X-XSS-Protection          "1; mode=block"    always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=()" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

        # ─── Block بدها ──────────────────────────────────────────────────────
        location ~* \.(env|git|htaccess|htpasswd|ini|log|sh|sql|conf)$ {
            deny all;
            return 404;
        }

        location ~* (wp-admin|wp-login|phpmyadmin|xmlrpc) {
            deny all;
            return 404;
        }

        # ─── Static Files ─────────────────────────────────────────────────────
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;

            location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ─── Media Files ──────────────────────────────────────────────────────
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";

            location ~* \.(php|py|sh|pl|cgi)$ {
                deny all;
                return 403;
            }
        }

        # ─── Health Check ─────────────────────────────────────────────────────
        location /health/ {
            proxy_pass http://django;
            access_log off;
            proxy_read_timeout 5s;
        }

        # ─── OTP Endpoint ─────────────────────────────────────────────────────
        location ~* ^/api/v[0-9]+/auth/otp/ {
            limit_req zone=otp burst=2 nodelay;
            proxy_pass http://django;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ─── Auth Endpoints ───────────────────────────────────────────────────
        location ~* ^/api/v[0-9]+/auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://django;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ─── API ──────────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://django;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ─── WebSocket ────────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://django;
            proxy_http_version 1.1;

            # ✅ اصلاح شد: از متغیر map استفاده می‌کنیم
            # مقدار ثابت "upgrade" باعث میشد HTTP keepalive خراب بشه
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # timeout بالا برای نگه داشتن اتصال WebSocket
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # buffering رو خاموش کن — برای real-time ضروریه
            proxy_buffering off;
        }

        # ─── Django (همه چیز دیگه) ────────────────────────────────────────────
        location / {
            proxy_pass http://django;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ─── Error Pages ──────────────────────────────────────────────────────
        error_page 404              /404.html;
        error_page 500 502 503 504  /50x.html;
        error_page 429              /429.html;

        location ~ ^/(404|50x|429)\.html$ {
            root /app/static/errors/;
            internal;
        }
    }
}